<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A Progressive Web App for generating restaurant menus and invoices" />
  <meta name="theme-color" content="#4b5563" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Restro Invoice" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <title>Restaurant Menu & Invoice Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🍽️ Restaurant Menu & Invoice Generator</h1>

    <!-- Menu Section -->
    <div class="menu-section">
      <div class="form-group">
        <label>Date:</label>
        <input type="text" id="entryDate" placeholder="YYYY-MM-DD (type manually)" />
      </div>

      <div class="form-group">
        <label>Main Category:</label>
        <select id="mainCategory" onchange="updateSubCategory1()">
          <option value="">-- Select Main Category --</option>
        </select>
      </div>

      <div class="form-group">
        <label>Subcategory 1:</label>
        <select id="subCategory1" onchange="updateSubCategory2()">
          <option value="">-- Select Subcategory 1 --</option>
        </select>
      </div>

      <div class="form-group">
        <label>Subcategory 2:</label>
        <select id="subCategory2" onchange="updateItems()">
          <option value="">-- Select Subcategory 2 --</option>
        </select>
      </div>

      <div class="form-group">
        <label>Items:</label>
        <div class="manual-item-section">
          <select id="itemList" onchange="autoFillPrice()">
            <option value="">-- Select Item --</option>
          </select>
          <button id="toggleManualItemBtn" onclick="toggleManualItem()">Manual Item Entry</button>
          <input type="text" id="manualItemInput" placeholder="Enter custom item name" style="display:none;">
        </div>
      </div>

      <div class="price-section">
        <label>Price (Rs):</label>
        <div class="price-input">
          <input type="number" id="priceInput" placeholder="Auto Price" readonly />
          <button id="manualPriceBtn" onclick="enterManualPrice()">+</button>
        </div>
      </div>

      <div class="qty-section">
        <label>Quantity:</label>
        <input type="number" id="quantityInput" min="1" value="1" />
      </div>

     <!-- Buttons: Add, Reset (new), Clear All -->
<div class="controls-row">
  <button id="addBtn" onclick="addToInvoice()">Add to Invoice</button>
  <button id="resetBtn" type="button">Reset Inputs</button>
  <button id="clearAllBtn" type="button">Clear All</button>
</div>

    </div>

    <!-- Invoice Section -->
    <div class="invoice-section">
      <h2>🧾 Invoice</h2>
      <div class="table-wrapper">
        <table id="invoiceTable">
          <thead>
            <tr>
              <th>Date</th>
              <th>Item Name</th>
              <th>Price (Rs)</th>
              <th>Quantity</th>
              <th>Total (Rs)</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="invoice-total">
        <h3>Total Amount: Rs <span id="grandTotal">0</span></h3>
      </div>

      <button onclick="printInvoice()">🖨️ Print Invoice</button>
    </div>
  </div>

  <!-- Script -->
  <script src="script.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            console.log('SW registered: ', registration);
          })
          .catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
      });
    }
  </script>
</body>
</html>
